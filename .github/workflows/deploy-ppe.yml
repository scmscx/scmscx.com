name: Deploy PPE (Cloudflare Pages)

# Builds the Pages frontend + Functions and deploys them to the `scmscx-ppe`
# Cloudflare Pages project, which serves ppe.scmscx.com in parallel with the
# existing scmscx.com system. See docs/cloudflare-ppe-setup.md.
#
# One-time setup (dashboard): create a Pages project named `scmscx-ppe` with its
# PRODUCTION branch set to `ppe`, add the `ppe.scmscx.com` custom domain, and set
# the env var ORIGIN_BASE=https://scmscx.com. Repo secrets: CLOUDFLARE_API_TOKEN
# (Pages:Edit) and CLOUDFLARE_ACCOUNT_ID. Then push the migration branch as `ppe`.

on:
  push:
    branches: [ppe]
    paths:
      - "app/**"
      - "functions/**"
      - "index.html"
      - "vite.pages.config.ts"
      - "package.json"
      - "package-lock.json"
      - "wrangler.toml"
      - ".github/workflows/deploy-ppe.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
        # No submodules: the Pages bundle is pure npm/vite (the C submodules are
        # only needed for the Rust build).

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install and build the Pages bundle
        run: npm ci && npm run build:pages

      - name: Deploy to Cloudflare Pages (ppe.scmscx.com)
        if: github.event_name != 'pull_request'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Run from the repo root so wrangler also compiles ./functions into the
          # deployment. No --branch: on the `ppe` push wrangler infers branch `ppe`,
          # which is scmscx-ppe's production branch -> a production deployment that
          # ppe.scmscx.com serves. ORIGIN_BASE is set on the Pages project, not here.
          command: pages deploy dist/pages --project-name=scmscx-ppe
