name: CI-and-push

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  RUSTFLAGS: -Dwarnings

jobs:
  test:
    # Build/lint/test, the E2E suite, the debug image, and the push — one job so
    # they share a single checkout, build environment, and warm sccache. The
    # nightly full-workspace mutation run lives in its own scheduled workflow
    # (mutants.yaml).
    timeout-minutes: 45
    name: ${{format('Cargo {0}', matrix.rust)}}
    # if: false
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        include:
          # - rust: nightly
          # - rust: beta
          - rust: stable
          # - rust: 1.74.0
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: "recursive"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{matrix.rust}}
          components: clippy, rustfmt

      - name: Set up build environment
        uses: ./.github/actions/setup-build-env

      - run: make fmt
      - run: make clippy
      - run: make test
      - run: make e2e
      - run: make scmscx.com-image-debug
      - run: make push

      - name: sccache stats
        if: always()
        uses: ./.github/actions/sccache-stats
