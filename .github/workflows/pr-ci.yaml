name: PR-CI

on:
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  # Detect whether this PR touches anything that affects the Rust build/test/mutants.
  # Frontend-only PRs (app/, functions/, docs, wrangler.toml, …) skip the heavy Cargo
  # job below. KEEP THE `rust` FILTER IN SYNC WITH ci.yaml's `on.push.paths`.
  changes:
    runs-on: self-hosted
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v5
      - id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'bwrender/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.cargo/**'
              - 'rust-toolchain.toml'
              - 'rustfmt.toml'
              - 'Makefile'
              - 'Dockerfile'
              - 'bwrender.Dockerfile'
              - '.dockerignore'
              - 'postgres/**'
              - '.gitmodules'
              - '.github/workflows/pr-ci.yaml'
              - '.github/actions/**'

  test:
    needs: changes
    # Run the full Rust CI when Rust-relevant files changed, and ALWAYS on the merge
    # queue / manual dispatch (the final pre-merge gate must not be skippable). A job
    # skipped via `if:` still reports its check as "skipped", which branch protection
    # treats as passing — so a frontend-only PR is not blocked on this required check.
    if: needs.changes.outputs.rust == 'true' || github.event_name != 'pull_request'
    timeout-minutes: 60
    name: ${{format('Cargo {0}', matrix.rust)}}
    # if: false
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        include:
          # - rust: nightly
          # - rust: beta
          - rust: stable
          # - rust: 1.74.0
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: "recursive"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{matrix.rust}}
          components: clippy, rustfmt

      - name: Set up build environment
        uses: ./.github/actions/setup-build-env

      - run: make fmt
      - run: make clippy
      - run: make test
      - run: make e2e
      - run: make scmscx.com-image-debug

      - name: Install cargo-mutants
        if: github.event_name == 'pull_request'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants@27.1.0
      - name: Run cargo mutants (changed lines only)
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          # Read the warm cache but don't write per-mutant single-use compiles into
          # it. Cache reuse relies on mutant builds using the same rustc flags: no
          # RUSTFLAGS override + cap_lints OFF in .cargo/mutants.toml (see the
          # full-run job in ci.yaml for the rationale).
          SCCACHE_WEBDAV_RW_MODE: READ_ONLY
        run: |
          set +e
          # The PR is checked out as the base+head merge ref, so a diff against the
          # freshly fetched base tip is exactly this PR's own changes.
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}" \
            || { echo "::error::failed to fetch base ${{ github.base_ref }}"; exit 1; }
          git diff FETCH_HEAD HEAD > pr.diff
          if [ ! -s pr.diff ]; then
            echo "Empty diff — nothing to mutate."
            exit 0
          fi
          # cargo-mutants only draws its live n/N progress on a TTY, which CI is
          # not — prefix each completed-mutant line with a running [done/total]
          # counter (mawk-safe; see the full-run job in ci.yaml for the rationale).
          make mutants MUTANTS_ARGS="--in-diff pr.diff" 2>&1 | awk '
            /^Found [0-9]+ mutant.* to test/ { total = $2 }
            /^(caught|MISSED|FAILED|ok|unviable|TIMEOUT) +[^ ]+:[0-9]+:[0-9]+:/ { printf "[%d/%s] ", ++done, total }
            { print; fflush() }'
          status=${PIPESTATUS[0]}   # make's exit, not awk's
          # A PR touching no mutated file yields zero mutants (exit 0). Trust the
          # exit status rather than the caught-count heuristic the full run needs.
          if [ "$status" -eq 0 ]; then
            echo "No surviving mutants in the changed lines."
            exit 0
          fi
          if [ -s mutants.out/missed.txt ]; then
            echo "::error::these changed lines have surviving mutants — add tests to catch them:"
            cat mutants.out/missed.txt
          fi
          exit "$status"

      - name: Mutants summary
        if: always() && github.event_name == 'pull_request'
        uses: ./.github/actions/mutants-summary
      - name: sccache stats
        if: always()
        uses: ./.github/actions/sccache-stats
