name: Set up build environment
description: >
  Provisions the C/C++ system libraries and the vcpkg toolchain that this
  repo's native crates (chkdraft-bindings, stormlib-bindings, uchardet-bindings,
  compact_enc_det-bindings) need in order to build. A stock runner does not have
  these, so they are installed here. Exports VCPKG_ROOT for the rest of the job.

runs:
  using: composite
  steps:
    - name: Install system dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
          perl build-essential git clang lld cmake pkg-config \
          zip unzip zstd curl jq ca-certificates gnupg \
          libssl-dev libsqlite3-dev \
          fontconfig libfontconfig-dev \
          libxinerama-dev libxcursor-dev xorg-dev libglu1-mesa-dev \
          autoconf automake libtool gperf autoconf-archive \
          python3-dev \
          npm \
          podman uidmap fuse-overlayfs slirp4netns

    # Cache vcpkg's compiled port binaries in the same self-hosted WebDAV store
    # as sccache (unscoped + local, so no ref-scoped cold starts) via vcpkg's
    # native http binary source. Objects are stored flat at the WebDAV root with
    # a `vcpkg-` filename prefix: rclone's PUT needs an existing parent
    # collection and the root always exists, whereas a `/vcpkg/` subdir would
    # 409 until MKCOL'd. `{sha}` is vcpkg's per-package ABI hash.
    - name: Configure vcpkg binary cache
      shell: bash
      run: |
        echo 'VCPKG_BINARY_SOURCES=clear;http,http://10.0.2.2:9000/vcpkg-{sha},readwrite' >> "$GITHUB_ENV"

    - name: Set up vcpkg
      shell: bash
      run: |
        if [ ! -d "$HOME/vcpkg/.git" ]; then
          git clone https://github.com/microsoft/vcpkg.git "$HOME/vcpkg"
        fi
        "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
        echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"

    # Only the crate downloads are cached here (on the GitHub Actions cache);
    # compiler output is cached at the rustc level by sccache and vcpkg's port
    # binaries via the WebDAV store above, so this just avoids re-downloading
    # crates. target/ is deliberately not cached (it would be many GB).
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry/index
          ~/.cargo/registry/cache
          ~/.cargo/git/db
        key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
        restore-keys: |
          cargo-${{ runner.os }}-

    # Compiler caching. sccache caches individual rustc invocations, keyed by a
    # hash of the inputs. It's backed by a self-hosted WebDAV store, which is
    # unscoped (shared across PRs and main, unlike GitHub's ref-scoped Actions
    # cache, so there are no cold starts) and local (low read latency, no
    # 10GB/LRU/409 baggage). sccache does not cache build scripts or the C/C++
    # (cc/cmake/vcpkg) compiles, but those are handled by the vcpkg binary cache
    # above. The env vars are exported for the whole job; the sccache server
    # starts lazily on the first rustc call and reads them then. CARGO_INCREMENTAL
    # must be off for sccache to be able to cache.
    - name: Configure sccache
      shell: bash
      run: |
        echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
        echo "SCCACHE_WEBDAV_ENDPOINT=http://10.0.2.2:9000" >> "$GITHUB_ENV"
        echo "CARGO_INCREMENTAL=0" >> "$GITHUB_ENV"

    - name: Install sccache
      uses: taiki-e/install-action@v2
      with:
        tool: sccache@0.16.0
