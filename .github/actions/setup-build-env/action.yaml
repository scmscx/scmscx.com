name: Set up build environment
description: >
  Provisions the C/C++ system libraries and the vcpkg toolchain that this
  repo's native crates (chkdraft-bindings, stormlib-bindings, uchardet-bindings,
  compact_enc_det-bindings) need in order to build. A stock runner does not have
  these, so they are installed here. Exports VCPKG_ROOT for the rest of the job.

runs:
  using: composite
  steps:
    - name: Install system dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
          perl build-essential git clang lld cmake pkg-config \
          zip unzip zstd curl jq ca-certificates gnupg \
          libssl-dev libsqlite3-dev \
          fontconfig libfontconfig-dev \
          libxinerama-dev libxcursor-dev xorg-dev libglu1-mesa-dev \
          autoconf automake libtool gperf autoconf-archive \
          python3-dev \
          npm \
          podman uidmap fuse-overlayfs slirp4netns

    - name: Cache vcpkg binary archives
      uses: actions/cache@v4
      with:
        path: ~/.cache/vcpkg/archives
        key: vcpkg-${{ runner.os }}-${{ hashFiles('crates/chkdraft-bindings/Chkdraft/src/map_gfx_utils/vcpkg.json', 'crates/chkdraft-bindings/Chkdraft/vcpkg-overlay-ports/**') }}
        restore-keys: |
          vcpkg-${{ runner.os }}-

    - name: Set up vcpkg
      shell: bash
      run: |
        if [ ! -d "$HOME/vcpkg/.git" ]; then
          git clone https://github.com/microsoft/vcpkg.git "$HOME/vcpkg"
        fi
        "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
        echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"

    # Only the crate downloads are cached, not target/: a full `make ci` builds
    # the workspace in several configs, so target/ would be many GB and would
    # blow the 10 GB per-repo cache budget (evicting the more valuable vcpkg
    # cache). Compiler output is cached at the rustc level by sccache below
    # instead; this step just avoids re-downloading crates.
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry/index
          ~/.cargo/registry/cache
          ~/.cargo/git/db
        key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
        restore-keys: |
          cargo-${{ runner.os }}-

    # Compiler caching. sccache caches individual rustc invocations keyed by a
    # hash of the inputs, which is far more space-efficient than caching target/
    # wholesale, so it fits GitHub's 10 GB per-repo cache budget. It does not
    # cache build scripts or the C/C++ (cc/cmake/vcpkg) compiles, but those are
    # already handled by the vcpkg binary cache above. The env vars are exported
    # for the whole job (make ci / make push); the sccache server starts lazily
    # on the first rustc call and reads them then. CARGO_INCREMENTAL must be off
    # for sccache to be able to cache.
    - name: Configure sccache
      shell: bash
      run: |
        echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
        echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
        echo "CARGO_INCREMENTAL=0" >> "$GITHUB_ENV"

    # Installs the sccache binary and forwards the GitHub Actions cache
    # credentials (which are otherwise not visible to `run:` steps) so the
    # sccache GHA backend can reach the cache service.
    - name: Install sccache
      uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
