# Deliberately NOT mutated: `crates/bwmapserver/src/actix.rs` (the ~1300-line
# router/wiring + inline core handlers — mostly framework plumbing E2E covers
# only partially) and `crates/bwmapserver/src/api/bulkupload.rs` (not wired to any
# route — dead code, so every mutant would trivially survive). Add files here as
# their coverage justifies it.

# Don't mutate the argument lists of these calls — logging (no observable behavior
# change) or terminating (control flow doesn't continue, so mutating the arguments
# is meaningless).
skip_calls = [
    "println!", "eprintln!", "print!", "eprint!",
    "trace!", "debug!", "info!", "warn!", "error!", "event!", "span!",
    "panic!", "unreachable!", "todo!", "unimplemented!",
]
skip_calls_defaults = true

# Equivalent mutations — production and mutated code behave identically for every
# input, so no test could ever distinguish them. Each entry has a one-line
# rationale; keeping them out of scope stops them from masquerading as coverage
# gaps.
exclude_re = [
    # id.rs::convert_id_to_byte_array decomposes an i64 into base-256 bytes as
    # `(input / 256^k % 256) as u8`. Replacing `% 256` with `+ 256` is a no-op
    # under the `as u8` truncation: (x + 256) mod 256 == x mod 256 for all x, so
    # the mutated byte is bit-identical.
    'replace % with \+ in convert_id_to_byte_array',
    # id.rs::encode_base32 packs the 40-bit array into 5-bit groups by OR-ing two
    # shifted-and-masked fields whose set bits are provably disjoint (e.g. bits
    # 2..4 with bits 0..1). For disjoint operands `a | b == a ^ b` for every
    # input, so the `|`->`^` mutation is a true equivalent.
    'replace \| with \^ in encode_base32',

    # ratelimit.rs::retain_recent is pure housekeeping: it drops fully-replenished
    # idle keys (recreated identically on the next check) and shrinks the map. No
    # rate-limiting decision or Retry-After changes — the only effect is memory
    # footprint, which the API doesn't expose. Behavior-equivalent.
    'replace UsernameLoginLimiter::retain_recent with \(\)',
    # ratelimit.rs::clock returns a shared `&'static DefaultClock`; the mutant leaks a
    # fresh one per call. DefaultClock (quanta) reads a global monotonic reference, so
    # a fresh instance's now() is identical, and Retry-After is floored to whole
    # seconds anyway. Differs only by a per-call leak — behavior-equivalent.
    'replace clock -> &.static DefaultClock with Box::leak',

    # --- Line-anchored equivalents / harness-limited (anchored by line:col because
    # the mutant text alone doesn't distinguish them from sibling, real mutants;
    # re-check if these files shift) ---
    # map_info.rs: the shift here is `1 << 0`, and `1 << 0 == 1 >> 0 == 1` — a true
    # equivalent. (The sibling shifts `1<<1/2/3` ARE real and pinned by the melee
    # force-properties test, so this must stay line-anchored, not function-wide.)
    'uiv2/map_info\.rs:165:\d+: replace << with >>',
    # chk.rs get_eups `owner > 12`→`>= 12` differs only on a unit with owner == 12.
    # Audited 298 real maps: none exists (normal maps cap owners at 11; EUP maps jump
    # straight to 84/114/255…). No obtainable fixture can distinguish it.
    'chk\.rs:228:33: replace > with >=',
    # uiv2/mod.rs get_map_image blackhole gate: with GSFS disabled in the harness the
    # endpoint 404s every image anyway, so `&&`→`||` (which only changes WHICH 404
    # path is taken) is unobservable here. The same blackhole-gate logic IS covered on
    # the minimap route (which has a local fallback) by `image_endpoints_gate_access`.
    'uiv2/mod\.rs:359:\d+: replace && with \|\|',
    # uiv2/mod.rs get_map_image blackhole gate, the `!=` comparisons (cols 30 and 62):
    # `user_id != Some(uploaded_by)`→`==` and `user_id != Some(4)`→`==`. Same story as
    # the `&&` above — with GSFS disabled the endpoint 404s every image regardless of
    # the gate's decision, so flipping a comparison only changes WHICH 404 path runs.
    'uiv2/mod\.rs:359:30: replace != with ==',
    'uiv2/mod\.rs:359:62: replace != with ==',

    # traceid.rs trace_id: `if status.is_success() || status.is_redirection()` only
    # SELECTS the log severity (info! vs warn!/error!) for the request-completion line;
    # every arm returns the same response unchanged. Flipping `||`→`&&` (2xx/3xx would
    # log at warn instead of info) has no DB- or HTTP-observable effect, so no e2e/unit
    # test can catch it — a logging-only equivalent. Anchored by line:col since
    # sibling mutants on this line would be the same logging-only branch.
    'traceid\.rs:49:\d+: replace \|\| with &&',
    # search2.rs `unwrap_or(-1)` sentinel for a NULL modified_time. The normal upload
    # path always writes a filetime row, so the branch is unreachable without a DB
    # helper to delete it — killable in principle but very low value. Two identical
    # sites (the empty-query and keyword-query branches), one exclusion each.
    'search2\.rs:126:\d+: delete -',
    'search2\.rs:208:\d+: delete -',
    # chk.rs get_eups `unit_id > 227`→`>= 227` differs only on a placed unit of type
    # exactly 227 (the last normal id). The unit-id-extended fixture's ids are all
    # > 227 and no normal fixture places a type-227 unit, so nothing distinguishes it —
    # the unit-id sibling of the `owner > 12`→`>= 12` boundary excluded above.
    'chk\.rs:228:51: replace > with >=',
    # map_info.rs eups counter `unit_id > 227 || owner > 27`: the `||`, the `>`→`==`
    # collapses, and the `+=` are pinned by map_info_counts_extended_unit_placements
    # (poker = 39 owner-side, untitled = 7 unit-id-side). Only the `>`→`>=` boundary
    # survives — it differs solely on a placed unit of type exactly 227 or an owner of
    # exactly 27, which no available fixture contains (same boundary logic as the chk
    # owner==12 / unit_id==227 exclusions above).
    'uiv2/map_info\.rs:250:29: replace > with >=',
    'uiv2/map_info\.rs:250:49: replace > with >=',
    # map_info.rs wav-set match arms for Action::Transmission (line 312) and
    # MissionBriefingAction::DisplayTransmission (line 334). The wav set is a HashSet;
    # across every fixture the wavs these arms contribute are also referenced by a
    # PlayWav action, so deleting either arm never changes the deduplicated set (the
    # PlayWav arms themselves ARE pinned — the exact 13-wav LotR set in
    # map_info_reports_parsed_chk_structure). Catching these needs a fixture with a wav
    # referenced ONLY by a Transmission, which the suite doesn't have.
    'uiv2/map_info\.rs:312:\d+: delete match arm',
    'uiv2/map_info\.rs:334:\d+: delete match arm',
    # units.rs line 74 is the legacy UNIS-section fallback branch (`else if
    # parsed_chk.unis`), reached only by maps carrying the old UNIS section without the
    # modern UNIx one. Every fixture uses UNIx, exercising the identical filter on line
    # 58 (pinned by units_endpoint_lists_named_units), so the UNIS branch's
    # `==`/`!=`/`&&` mutants are unobservable without an old-format fixture.
    'uiv2/units\.rs:74:\d+: replace',
    # map_info.rs trigger-list counters (`trigger_list_reads`, Deaths conditions at
    # lines 287-288; `trigger_list_writes`, SetDeaths actions at 305-306) tally EUD
    # references that land in the 96-byte window [0x51A280, 0x51A2E0). No fixture has a
    # reference in that exact window, so both counters are 0 everywhere. The
    # range-WIDENING mutants ARE killed — `&&`→`||`, `<`→`>`, and `>=`→`<` on the WRITE
    # side pull income_wars's 60 death-reads / 2020 death-writes into range and flip
    # the counter nonzero, which map_info_counts_extended_unit_deaths pins to 0. What's
    # left below only ever keeps the counter at 0: the exact-boundary flips (`<`→`==`,
    # `<`→`<=`), the read-side `>=`→`<` (income_wars has no death-read below 0x51A280),
    # and the `+=` increments (never reached, so `-=`/`*=` still yield 0). Killing
    # these needs a trigger-list-manipulation map the suite doesn't have. Anchored by
    # line:col:replacement so the caught widening siblings on the same lines stay live.
    'uiv2/map_info\.rs:287:36: replace >= with <',
    'uiv2/map_info\.rs:287:63: replace < with ==',
    'uiv2/map_info\.rs:287:63: replace < with <=',
    'uiv2/map_info\.rs:288:44: replace \+= with',
    'uiv2/map_info\.rs:305:40: replace >= with <',
    'uiv2/map_info\.rs:305:67: replace < with ==',
    'uiv2/map_info\.rs:305:67: replace < with <=',
    'uiv2/map_info\.rs:306:49: replace \+= with',
]

# Timeouts. Unit tests run in milliseconds; the E2E tests boot a server + clone a
# database and finish in a few seconds. The multipliers plus a 60s floor give a
# mutant that breaks startup (so every E2E test waits out its readiness timeout)
# room to be killed as a hang rather than mis-timed.
build_timeout_multiplier = 3.0
timeout_multiplier = 2.0
minimum_test_timeout = 60.0

# cap_lints is deliberately NOT set. cargo-mutants implements `cap_lints = true` by
# exporting CARGO_ENCODED_RUSTFLAGS=--cap-lints=warn (see cargo.rs::encoded_rustflags),
# and it does NOT read .cargo/config.toml — so that env var CLOBBERS this repo's
# `build.rustflags = ["--cfg", "tokio_unstable"]`. The result is that mutant builds
# use a different rustc command line than the `test` job, land in a different sccache
# keyspace, and (with the mutants job's READ_ONLY cache) recompile the whole workspace
# from scratch for every mutant. Leaving cap_lints off makes mutant builds inherit the
# same `--cfg tokio_unstable` as `test`, so they reuse its warm cache and only recompile
# the mutated crate. This is safe because nothing denies warnings in the build/test path
# (warnings-as-errors lives in `cargo clippy -- -D warnings`, which mutants never runs;
# workspace lints deny only clippy lints; `[lints.rust]` is warn-level). If you ever add
# rustc-level deny-warnings back, revisit this — but prefer keeping them in the clippy gate.
